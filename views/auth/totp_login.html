<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="flex flex-col items-center mb-8">
            <div
                class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-600/30 mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">Two-Factor Authentication</h1>
            <p class="text-sm text-[#8b949e] mt-1">Enter the code from your authenticator app</p>
        </div>

        <div class="bg-[#161b22] border border-[#30363d] rounded-2xl p-8 shadow-2xl">
            {{if .Error}}
            <div
                class="flex items-center gap-3 bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl px-4 py-3 mb-6 text-sm">
                <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                        clip-rule="evenodd" />
                </svg>
                {{.Error}}
            </div>
            {{end}}

            <form action="/totp/login" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-[#c9d1d9] mb-1.5">Authenticator Code</label>
                    <input type="text" name="code" required autofocus autocomplete="one-time-code"
                        class="input-field text-center tracking-[0.5em] text-xl font-mono" placeholder="000000"
                        maxlength="6" pattern="\d{6}">
                    <p class="text-xs text-[#484f58] mt-2 text-center">Code refreshes every 30 seconds</p>
                </div>
                <button type="submit" class="btn-primary w-full py-3">
                    Verify & Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-[#8b949e] mt-6">
            <a href="/login" class="text-indigo-400 hover:text-indigo-300 transition">← Back to login</a>
        </p>
    </div>
</div>
