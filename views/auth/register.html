<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">
        <div class="flex flex-col items-center mb-8">
            <div
                class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-600/30 mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">NeoVault</h1>
            <p class="text-sm text-[#8b949e] mt-1">Create your secure vault</p>
        </div>

        <div class="bg-[#161b22] border border-[#30363d] rounded-2xl p-8 shadow-2xl">
            {{if .Error}}
            <div
                class="flex items-center gap-3 bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl px-4 py-3 mb-6 text-sm">
                <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                        clip-rule="evenodd" />
                </svg>
                {{.Error}}
            </div>
            {{end}}

            <form action="/register" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-[#c9d1d9] mb-1.5">Username</label>
                    <input type="text" name="username" required autofocus class="input-field"
                        placeholder="Choose a username">
                </div>
                <div>
                    <label class="block text-sm font-medium text-[#c9d1d9] mb-1.5">Account Password</label>
                    <input type="password" name="password" required class="input-field"
                        placeholder="For logging in only">
                    <p class="text-xs text-[#484f58] mt-1.5">This is separate from your vault master password.</p>
                </div>
                <button type="submit" class="btn-primary w-full py-3 mt-2">
                    Create Account
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-[#8b949e] mt-6">
            Already have an account?
            <a href="/login" class="text-indigo-400 font-medium hover:text-indigo-300 transition">Sign in</a>
        </p>
    </div>
</div>
